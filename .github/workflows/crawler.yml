name: Innovation Radar Auto-Crawler

on:
  schedule:
    # Memeriksa setiap 2 hari. Script Python yang akan menentukan 
    # apakah hanya data.json yang dicrawl, atau sekalian resume.json
    - cron: "0 0 */1 * *"
  workflow_dispatch: 
    inputs:
      run_type:
        description: 'Pilih tipe eksekusi yang ingin dijalankan:'
        required: true
        default: 'auto'
        type: choice
        options:
          - 'auto'          # Mengikuti jadwal history (Data 2 hari, Resume 3 bulan)
          - 'force_data'    # Hanya mencari 3 data.json baru secara paksa
          - 'force_resume'  # Hanya men-generate resume.json baru secara paksa
          - 'force_both'    # Mencari data sekaligus men-generate resume

jobs:
  run-scraper-and-ai:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Intelligent Scheduler & AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Ambil input dari dropdown jika di-trigger manual, jika tidak (cron) gunakan 'auto'

          # 👇 TAMBAHKAN BARIS INI 👇
          GEMINI_MODEL: "gemini-3-flash-preview" # Default model, bisa diubah lewat env var jika ingin coba model lain
          # Ambil input dari dropdown jika di-trigger manual, jika tidak (cron) gunakan 'auto'
          RUN_TYPE: ${{ github.event.inputs.run_type || 'auto' }}
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Daftarkan semua file yang berpotensi berubah
          git add data.json resume.json history.json report.md || true
          
          if git diff --staged --quiet; then
            echo "No new data to commit."
          else
            git commit -m "🤖 Auto-update: Synchronized Radar Data & Resumes [skip ci]"
            git push
          fi

      - name: Keep repo alive
        run: |
          echo "Last run: $(date)" > .heartbeat
          git add .heartbeat
          git commit -m "💓 keep alive" || echo "No changes"
          git push || echo "Nothing to push"
