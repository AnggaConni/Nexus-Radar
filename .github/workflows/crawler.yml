name: Latent Signal Auto-Crawler

on:
  schedule:
    # Berjalan setiap hari pada jam 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: 
    inputs:
      run_type:
        description: 'Pilih tipe eksekusi yang ingin dijalankan:'
        required: true
        default: 'auto'
        type: choice
        options:
          - 'auto'          # Mengikuti jadwal (Cari data setiap 1 hari, Resume setiap 3 bulan)
          - 'force_data'    # Hanya mencari 2 data sinyal baru secara paksa
          - 'force_resume'  # Hanya men-generate resume laporan baru secara paksa
          - 'force_both'    # Mencari data sekaligus men-generate resume

jobs:
  run-scraper-and-ai:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Intelligent Scheduler & AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: "gemini-3-flash-preview" # Default model
          RUN_TYPE: ${{ github.event.inputs.run_type || 'auto' }}
          
          # Parameter opsional yang disesuaikan dengan script v2.1
          DATA_INTERVAL_DAYS: 1
          MAX_ITEMS_PER_RUN: 2
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # HANYA daftarkan file yang sekarang di-generate (report.md dihapus)
          git add data.json resume.json history.json || true
          
          if git diff --staged --quiet; then
            echo "No new data to commit."
          else
            git commit -m "🚨 Auto-update: Synchronized Signal Data & Risk Resumes [skip ci]"
            git push
          fi

      - name: Keep repo alive
        run: |
          echo "Last run: $(date)" > .heartbeat
          git add .heartbeat
          git commit -m "💓 keep alive" || echo "No changes"
          git push || echo "Nothing to push"
